name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose --release

  upload:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v3.2.0-node20
      with:
        path: target/release
